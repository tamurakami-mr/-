<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Page</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="container">
        <header class="status-bar">
            <p class="status-time" id="real-time"></p> 
            <div class="status-icons">
                <a href="index.html">
                <img src="img/headerimgwhite.PNG">
                </a>
            </div>
        </header>
        <div class="game-title">
            <h1>僕がよく遊んでいる<br><span class="game-title-sub">スマホ・PS5のゲームを紹介</span></h1>
        </div>
        <div class="game-list">
            <div class="game-name">
                <img src="img/purosupi.JPG" alt="ゲームアイコン画像">
                <img src="game/prospi.PNG" alt="説明画像" class="pointer">
            </div>
            <div class="game-name">
                <img src="img/maikura.JPG"  alt="ゲームアイコン画像">
                <img src="game/maikura.PNG" alt="説明画像" class="pointer">
            </div>
        </div>
        <div class="game-list">
            <div class="game-name">
                <img src="img/apex.JPG" alt="ゲームアイコン画像">
                <img src="game/apex.PNG" alt="説明画像" class="pointer">
            </div>
            <div class="game-name">
                <img src="img/tsumutsumu.JPG" alt="ゲームアイコン画像">
                <img src="game/tsumutsumu.PNG" alt="説明画像" class="pointer">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
