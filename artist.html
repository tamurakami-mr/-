<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Page</title>
  <link rel="stylesheet" href="artist.css">
</head>
<body>
    <div class="container">
        <header class="status-bar">
            <p class="status-time" id="real-time"></p> 
            <div class="status-icons">
                <a href="index.html">
                <img src="img/headerimgwhite.PNG">
                </a>
            </div>
        </header>
        <div class="artist-title">
            <p>好きなアーティストTier表</p>
        </div>
        <div class="artist-tier">
            <p class="sp btn">S+</p>
            <p class="s btn">S</p>
            <p class="sm btn">S-</p>
            <p class="ap btn">A+</p>
            <p class="a btn">A</p>
            <p class="am btn">A-</p>
            <p class="b btn">B</p>
            <p class="c btn">C</p>
            <p class="d btn">D</p>
            <p class="e btn">E</p>
        </div>
        <div class="artist-img">
            <img src="artist/1.JPG" class="his1 common">
            <img src="artist/2.PNG" class="his2 common">
            <img src="artist/3.JPG" class="his3 common">
            <img src="artist/4.JPG" class="his4 common">
            <img src="artist/5.JPG" class="his5 common">
            <img src="artist/9.JPG" class="his6 common">
            <img src="artist/7.JPG" class="his7 common">
            <img src="artist/8.PNG" class="his8 common">
            <img src="artist/6.PNG" class="his9 common">
            <img src="artist/10.PNG" class="his10 common">

        </div>
    </div>
    <script src="script.js"></script>
</body>
