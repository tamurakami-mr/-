<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramen Page</title>
  <link rel="stylesheet" href="ramen.css">
</head>
<body>
    <div class="container">
        <header class="status-bar">
            <p class="status-time" id="real-time"></p> 
            <div class="status-icons">
                <a href="index.html">
                <img src="img/headerimg.PNG">
                </a>
            </div>
        </header>

        <div class="ramen-wrapper">
            <div class="ramen-title">
                <h1>~北海道のおすすめラーメン紹介~</h1>
            </div>

        <div class="ramen-list">
            <div class="ramen-name">
                <img src="ramen/kotetu.PNG">
                <p>麺や虎鉄<br>えびみそラーメン</p>
            </div>
            <div class="ramen-name">
                <img src="ramen/utyuken.PNG">
                <p>宇宙軒ラーメン<br>味噌ラーメン</p>
            </div>
        </div>
        <div class="ramen-list">
            <div class="ramen-name">
                <img src="ramen/haku.PNG">
                <p>江別拉麺 博<br>まぜそば</p>
            </div>
            <div class="ramen-name">
                <img src="ramen/genten.PNG">
                <p>原ゝ（げんてん）<br><span class="txt1">黄身とふわっとなっと</span></p>
            </div>
        </div>
        <div class="ramen-list">
            <div class="ramen-name">
                <img src="ramen/tsunatori.PNG">
                <p>綱取り物語<br>綱取味噌ラーメン</p>
            </div>
            <div class="ramen-name">
                <img src="ramen/saimi.PNG">
                <p>麺屋 彩未<br><span class="txt1">味噌らーめん</span></p>
            </div>
        </div>
        </div>
     </div>
    <script src="script.js"></script>    
</body>
</html>
